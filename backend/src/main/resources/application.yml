# 开发环境配置。生产环境请使用 prod profile：
#   java -jar qr-stat-backend.jar --spring.profiles.active=prod
# 或者设环境变量：SPRING_PROFILES_ACTIVE=prod
#
# prod profile 文件：application-prod.yml
# 它会关闭 H2 控制台、关闭 sql.init、启用 context-path=/qr

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: qr-stat-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/qrstat;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

app:
  # 正式部署时改成公网 HTTPS 域名，例如：https://qr.yourcompany.com
  public-domain: http://localhost:8080
  qr-size: 300
  # 目标链接白名单，空表示不限制。生产环境建议配置公司域名，例如：yourcompany.com,www.yourcompany.com
  allowed-target-hosts:
  # 是否阻止跳转到内网 IP/localhost，建议保持 true
  block-private-address: true

  security:
    # true：后台管理接口需要登录；/q/{code} 扫码跳转接口不受影响
    enabled: true
    # 生产环境建议通过环境变量设置，不要直接写在代码仓库里
    admin-username: ${QR_ADMIN_USERNAME:admin}
    admin-password: ${QR_ADMIN_PASSWORD:changeme}
    # 登录会话过期时间，单位：分钟。默认 720 分钟，即 12 小时
    session-expire-minutes: ${QR_SESSION_EXPIRE_MINUTES:720}
