<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 左上角 QR 定位图案 -->
  <rect x="3" y="3" width="11" height="11" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="5" y="5" width="7" height="7" rx="1.5" fill="url(#bg)"/>
  <rect x="6.5" y="6.5" width="4" height="4" rx="0.8" fill="white"/>

  <!-- QR 数据点 -->
  <rect x="17" y="3" width="3" height="3" rx="0.6" fill="white" opacity="0.9"/>
  <rect x="22" y="3" width="7" height="3" rx="0.6" fill="white" opacity="0.65"/>
  <rect x="17" y="8" width="3" height="3" rx="0.6" fill="white" opacity="0.9"/>
  <rect x="22" y="8" width="3" height="3" rx="0.6" fill="white" opacity="0.65"/>
  <rect x="17" y="13" width="3" height="3" rx="0.6" fill="white" opacity="0.9"/>

  <!-- 左下角 QR 定位图案 -->
  <rect x="3" y="18" width="11" height="11" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="5" y="20" width="7" height="7" rx="1.5" fill="url(#bg)"/>
  <rect x="6.5" y="21.5" width="4" height="4" rx="0.8" fill="white"/>

  <!-- 折线统计图 -->
  <polyline
    points="17,27 19.5,22 22,24 24.5,17 27,19 29,13"
    fill="none" stroke="#34d399" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"
  />
  <circle cx="29" cy="13" r="1.8" fill="#34d399"/>

  <!-- 折线末端小圆点 -->
  <circle cx="17" cy="27" r="1" fill="#34d399" opacity="0.7"/>
  <circle cx="22" cy="24" r="1" fill="#34d399" opacity="0.7"/>
  <circle cx="27" cy="19" r="1" fill="#34d399" opacity="0.7"/>
</svg>
