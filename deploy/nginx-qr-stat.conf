# QR Stat MVP - Nginx 生产配置
# 部署路径：/etc/nginx/conf.d/qr-stat.conf
# 使用前将 your-ssl-cert-path 替换为实际证书路径

server {
    listen 80;
    server_name api.xubobo.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.xubobo.top;

    # SSL 证书（需自行申请，推荐 Let's Encrypt / acme.sh）
    # ssl_certificate     /your-ssl-cert-path/fullchain.pem;
    # ssl_certificate_key /your-ssl-cert-path/privkey.pem;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 日志
    access_log /var/log/nginx/qr-stat-access.log;
    error_log  /var/log/nginx/qr-stat-error.log;

    # 所有 /qr/ 路径代理到 Spring Boot 后端
    location /qr/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（当前未使用，保留以备后续）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
