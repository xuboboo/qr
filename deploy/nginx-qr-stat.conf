# QR Stat MVP - Nginx 生产配置
# 部署路径：/etc/nginx/conf.d/qr-stat.conf
# 后端打包后，一个 jar 跑前后端，Nginx 统一代理
#
# 重要：在 /etc/nginx/nginx.conf 的 http 块中确认已开启以下配置：
#   gzip on;
#   gzip_min_length 1k;
#   gzip_types text/plain text/css application/javascript application/json image/svg+xml;
#   gzip_comp_level 6;
#   gzip_vary on;
#
# systemd 启动命令加入内存限制（示例）：
#   java -Xms256m -Xmx256m -jar /opt/qr-stat/qr-stat-backend-1.0.0.jar --spring.profiles.active=prod

server {
    listen 80;
    server_name api.xubobo.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.xubobo.top;

    # SSL 证书（需自行申请，推荐 Let's Encrypt / acme.sh）
    # ssl_certificate     /your-ssl-cert-path/fullchain.pem;
    # ssl_certificate_key /your-ssl-cert-path/privkey.pem;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 日志
    access_log /var/log/nginx/qr-stat-access.log;
    error_log  /var/log/nginx/qr-stat-error.log;

    # 全部代理给 Spring Boot（一个 jar 包含前后端）
    location /qr/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 代理缓冲，减少后端响应压力
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
    
    # API 请求不做缓冲，保持实时
    location /qr/api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
