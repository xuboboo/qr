# QR Stat MVP - Nginx 生产配置
# 部署路径：/etc/nginx/conf.d/qr-stat.conf
# 使用前：
#   1. 将 /path/to/your/qr-static 替换为前端构建文件的目录路径
#   2. 将 your-ssl-cert-path 替换为实际证书路径

server {
    listen 80;
    server_name api.xubobo.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.xubobo.top;

    # SSL 证书（需自行申请，推荐 Let's Encrypt / acme.sh）
    # ssl_certificate     /your-ssl-cert-path/fullchain.pem;
    # ssl_certificate_key /your-ssl-cert-path/privkey.pem;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # 日志
    access_log /var/log/nginx/qr-stat-access.log;
    error_log  /var/log/nginx/qr-stat-error.log;

    # ========== 前端静态文件 ==========
    # 将前端构建后的 dist/ 目录上传到服务器，例如 /var/www/qr
    # 然后上传前端到服务器后，把下面的 alias 路径改成实际路径
    location /qr/ {
        alias /path/to/your/qr-static/;
        try_files $uri $uri/ /qr/index.html;
    }

    # ========== 后端 API 代理 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== 扫码跳转代理 ==========
    location /q/ {
        proxy_pass http://127.0.0.1:8080/q/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
